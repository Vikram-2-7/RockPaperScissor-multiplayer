<!DOCTYPE html>
<html lang="en" data-theme="pirate">
<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js" defer></script>
</head>
<body>

    <div class="bg">
        <div class="container">

            <!-- Theme Toggle -->
            <div class="theme-toggle-wrapper">
                <span class="theme-label">🏴‍☠️</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="themeToggle" onchange="switchTheme()">
                    <span class="slider"></span>
                </label>
                <span class="theme-label">🧜‍♀️</span>
            </div>

            <h1 class="title" id="title">⚓ Pirates of the Caribbean ⚓</h1>
            <h2 class="subtitle" id="subtitle">— A Game of Cannon, Map & Cutlass —</h2>

            <div class="status-box">
                <p id="status">Connecting to the seas...</p>
            </div>

            <div class="moves">
                <button class="move-btn" onclick="sendMove('rock')">
                    <span class="emoji" id="rock-emoji">💣</span>
                    <span class="move-name">Rock</span>
                </button>
                <button class="move-btn" onclick="sendMove('paper')">
                    <span class="emoji" id="paper-emoji">🗺️</span>
                    <span class="move-name">Paper</span>
                </button>
                <button class="move-btn" onclick="sendMove('scissors')">
                    <span class="emoji" id="scissors-emoji">⚔️</span>
                    <span class="move-name">Scissors</span>
                </button>
            </div>

            <div class="scoreboard">
                <div class="score-card">
                    <p class="score-label">You</p>
                    <p class="score-value" id="my-score">0</p>
                </div>
                <div class="score-divider">VS</div>
                <div class="score-card">
                    <p class="score-label">Opponent</p>
                    <p class="score-value" id="opp-score">0</p>
                </div>
            </div>

            <div class="round-box">
                <p id="round">Round 0</p>
            </div>

        </div>
    </div>

</body>
</html>
